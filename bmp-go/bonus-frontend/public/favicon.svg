<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e3a5f"/>
  <!-- Trophy / star gradient -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Trophy cup body -->
  <path d="M22 16 h20 l-3 16 a9 9 0 0 1-14 0 z" fill="url(#g1)"/>
  <!-- Cup handles -->
  <path d="M22 18 q-6 0 -6 6 a6 6 0 0 0 6 6" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M42 18 q6 0 6 6 a6 6 0 0 1-6 6" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Trophy stem -->
  <rect x="29" y="32" width="6" height="8" fill="url(#g1)"/>
  <!-- Trophy base -->
  <rect x="22" y="40" width="20" height="4" rx="2" fill="url(#g1)"/>
  <!-- Stars -->
  <circle cx="18" cy="12" r="2" fill="#facc15" opacity="0.7"/>
  <circle cx="46" cy="10" r="1.5" fill="#facc15" opacity="0.5"/>
  <circle cx="50" cy="20" r="1" fill="#facc15" opacity="0.4"/>
</svg>
