name: Deploy Web and Build Android APK

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Build React Frontend
        run: |
          npm run build --prefix frontend

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Native Files
        run: |
          cd frontend
          npx cap sync

      - name: Build Android APK (Gradle)
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Zip Web Dist Folder
        run: |
          cd frontend/dist
          zip -r ../dist.zip .
          cd ../..

      - name: Upload dist.zip and APK to VPS via SCP
        run: |
          scp -i ~/.ssh/id_rsa frontend/dist.zip ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/dist.zip
          scp -i ~/.ssh/id_rsa frontend/android/app/build/outputs/apk/debug/app-debug.apk ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/posbah-backend/app-debug.apk

      - name: Extract Web and Reload Services on VPS
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "sudo unzip -o /home/${{ secrets.VPS_USER }}/dist.zip -d /var/www/posbah && sudo systemctl reload nginx && echo 'Frontend Web successfully deployed!'"
